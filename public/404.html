<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI Traffic Brief</title>
  <script>
    // SPA redirect for GitHub Pages
    // Converts path to query string so index.html can restore it
    var seg = location.pathname.replace('/ai-traffic-brief', '').replace(/\/+$/, '');
    if (seg) {
      location.replace(
        location.origin + '/ai-traffic-brief/?route=' + encodeURIComponent(seg) + location.hash
      );
    } else {
      location.replace(location.origin + '/ai-traffic-brief/');
    }
  </script>
</head>
<body></body>
</html>
